name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Validate Composer manifest
        run: composer validate --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-php-8.3-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php-8.3-
            composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint PHP files
        run: find src config tests -name '*.php' -exec php -l {} \;

      - name: Run LevelPlay tests
        run: php tests/LevelPlayServiceTest.php

      - name: Run package structure tests
        run: php tests/PackageStructureTest.php

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
